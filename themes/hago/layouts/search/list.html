{{ define "main" }}
<section class="post">
  <div class="post-title">
    <h2>사이트 검색</h2>
  </div>
  <div class="post-content">
    <form action='{{ "/search/" | relURL }}' method="get" class="search-page-form mb-4">
      <div class="form-group search-page-form__field">
        <label for="internal-search-input">검색어</label>
        <div class="search-page-form__controls">
          <input id="internal-search-input" type="search" name="q" class="form-control search-page-form__input" placeholder='{{ i18n "menu_search_keyword" }}' />
          <button type="submit" class="btn btn-primary search-page-form__submit">검색</button>
        </div>
      </div>
    </form>

    <div id="search-meta" class="post-summary">검색어를 입력해 주세요.</div>
    <div id="search-results" class="mt-4"></div>
  </div>
</section>
{{ end }}

{{ define "side" }}
{{- partial "side_category.html" . -}}
{{- partial "side_tags.html" . -}}
{{ end }}
